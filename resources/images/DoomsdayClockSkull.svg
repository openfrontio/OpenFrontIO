    <g stroke="#191919" stroke-width="1.4" stroke-linecap="round">
      <line x1="13" y1="24.4" x2="13" y2="28.2"/>
      <line x1="16" y1="24.4" x2="16" y2="28.4"/>
      <line x1="19" y1="24.4" x2="19" y2="28.2"/>
    </g>
  </g>
</svg>
