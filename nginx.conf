# WebSocket settings
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Worker Port Mapping
map $worker_id $worker_port {
    default 3001;
    "0" 3001; "1" 3002; "2" 3003; "3" 3004; "4" 3005; "5" 3006; "6" 3007; "7" 3008; "8" 3009; "9" 3010;
    "10" 3011; "11" 3012; "12" 3013; "13" 3014; "14" 3015; "15" 3016; "16" 3017; "17" 3018; "18" 3019; "19" 3020;
    "20" 3021; "21" 3022; "22" 3023; "23" 3024; "24" 3025; "25" 3026; "26" 3027; "27" 3028; "28" 3029; "29" 3030;
    "30" 3031; "31" 3032; "32" 3033; "33" 3034; "34" 3035; "35" 3036; "36" 3037; "37" 3038; "38" 3039; "39" 3040;
    "40" 3041;
}

# Upstream with Keepalive (Optimization)
upstream backend_main {
    server 127.0.0.1:3000;
    keepalive 64; # Keep connections alive to backend
}

# Cache configurations
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=24h max_size=1g;
# Microcaching zone for fast dynamic content caching (API)
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=API_CACHE:10m inactive=60m max_size=100m;
proxy_cache_key "$scheme$request_method$host$request_uri"; # Optimized Cache Key

server {
    # HTTP/1.1 fallback
    listen 80;


    server_name _;

    # ---------- TCP and Kernel Optimizations ----------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ---------- Compression: Gzip & Brotli ----------
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # brotli on; # Uncomment if Brotli module is installed
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---------- Open File Cache ----------
    open_file_cache max=10000 inactive=5m;
    open_file_cache_valid 2m;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # Buffer Settings
    large_client_header_buffers 4 32k;
    proxy_buffer_size 32k;
    proxy_busy_buffers_size 48k;
    proxy_buffers 4 32k;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Common Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Required for Keepalive to upstream
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ---------- Asset Routing ----------
    location ^~ /assets/ {
        proxy_pass http://backend_main;
        access_log off; # Disable logging for static files

        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /_assets/ {
        proxy_pass http://backend_main;
        access_log off;

        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---------- Worker Assets Routing ----------
    location ~* ^/w(\d+)(/(?:assets|_assets)/.*)$ {
        set $worker_id $1;
        proxy_pass http://127.0.0.1:$worker_port$2$is_args$args;
        access_log off;

        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------- Worker API Routing ----------
    location ~* ^/w(\d+)(/.*)?$ {
        set $worker_id $1;
        proxy_pass http://127.0.0.1:$worker_port$2$is_args$args;
        
        # Microcaching for worker API
        proxy_cache API_CACHE;
        proxy_cache_valid 200 1s; 
        proxy_cache_use_stale updating;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------- Static Files ----------
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend_main;
        include /etc/nginx/mime.types;
        access_log off;

        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=86400";
    }

    # ---------- Health Check ----------
    location = /api/health {
        proxy_pass http://backend_main;
        proxy_cache off;
        access_log off;
        
        add_header X-Cache-Status "BYPASS";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ---------- commit.txt ----------
    location = /commit.txt {
        proxy_pass http://backend_main;
        access_log off;

        # Microcaching
        proxy_cache API_CACHE;
        proxy_cache_valid 200 5s;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---------- Binary files ----------
    location ~* \.(bin|dat|exe|dll|so|dylib)$ {
        proxy_pass http://backend_main;
        access_log off;
        
        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---------- JavaScript ----------
    location ~* \.js$ {
        proxy_pass http://backend_main;
        access_log off;
        
        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;

        add_header Content-Type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---------- CSS ----------
    location ~* \.css$ {
        proxy_pass http://backend_main;
        access_log off;
        
        proxy_cache STATIC;
        proxy_cache_valid 200 302 24h;

        add_header Content-Type text/css;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---------- HTML ----------
    location ~* \.html$ {
        proxy_pass http://backend_main;
        
        # Microcaching for HTML
        proxy_cache STATIC;
        proxy_cache_valid 200 302 1s;

        add_header Content-Type text/html;
        add_header Cache-Control "public, max-age=1";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ---------- Root ----------
    location = / {
        proxy_pass http://backend_main;

        proxy_cache STATIC;
        proxy_cache_valid 200 302 300s;

        add_header X-Cache-Status $upstream_cache_status;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------- Default ----------
    location / {
        proxy_pass http://backend_main;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
