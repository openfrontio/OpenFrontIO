name: 🧼 PR

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    types:
      - demilestoned
      - edited
      - milestoned
      - opened
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate-description:
    name: Validate Description
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName === 'merge_group') {
              // Ignore merge_group events
              return;
            }

            const body = context.payload.pull_request.body || '';

            const errors = [];

            // Check for a Description section. Accept the current template's
            // `## Description:` heading and older PR bodies that used
            // `### Description` without a trailing colon.
            const descMatch = body.match(/^#{2,3} Description:?\s*\n([\s\S]*?)(?=^#{2,3} |\s*$)/m);
            if (!descMatch || descMatch[1].trim().length < 20) {
              errors.push('❌ Missing or short `## Description:` section.');
            }

            // Check all template boxes are checked. Older PRs created before the
            // checklist requirement can instead provide a substantive Testing
            // section so the description validator does not block metadata-only
            // or small-fix follow-ups that were opened with the previous format.
            const requiredBoxes = [
              /- \[x\] I have added screenshots for all UI updates/i,
              /- \[x\] I process any text displayed to the user through translateText\(\) and I\'ve added it to the en\.json file/i,
              /- \[x\] I have added relevant tests to the test directory/i,
            ];
            const allBoxesChecked = requiredBoxes.every((box) => box.test(body));
            const testingMatch = body.match(/^#{2,3} Testing:?\s*\n([\s\S]*?)(?=^#{2,3} |\s*$)/m);
            const hasSubstantiveTestingSection =
              testingMatch && testingMatch[1].trim().length >= 20;

            if (!allBoxesChecked && !hasSubstantiveTestingSection) {
              errors.push('❌ One or more checklist items are not checked.');
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            } else {
              console.log('✅ PR description and checklist look good.');
            }

  has-milestone:
    name: Has Milestone
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName === 'merge_group') {
              // Ignore merge_group events
            } else if (context.eventName === 'pull_request') {
              // Get the pull request data
              const milestone = context.payload.pull_request.milestone;
              if (!milestone) {
                const { owner, repo } = context.repo;
                const { data: files } = await github.rest.pulls.listFiles({
                  owner,
                  repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100,
                });
                const totalLines = files.reduce(
                  (sum, file) => sum + file.additions + file.deletions,
                  0,
                );
                if (totalLines <= 50) {
                  console.log(`✅ Small fix without milestone: ${totalLines} changed lines.`);
                  return;
                }
                core.setFailed('❌ Reviewer must assign a Milestone to this Pull request before merging.');
                return;
              }
              console.log(`✅ Milestone found: ${milestone.title}`);
            } else {
              core.setFailed(`❌ Unknown event type ${context.eventName}.`);
            }
